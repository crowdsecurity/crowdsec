# publiccode.yml — CrowdSec
# Metadata standard for public software (https://yml.publiccode.tools)
# Place this file at the ROOT of the repository: https://github.com/crowdsecurity/crowdsec
# Third-party open source software: the codiceIPA field stays EMPTY (see the "it" section below).
# After committing, open an issue on the Developers Italia Catalogo repository to submit the software.

publiccodeYmlVersion: "0.4"

name: CrowdSec
url: "https://github.com/crowdsecurity/crowdsec"
landingURL: "https://www.crowdsec.net"
softwareVersion: "1.7.8"
releaseDate: "2026-05-11"
logo: "https://raw.githubusercontent.com/crowdsecurity/crowdsec-docs/main/crowdsec-docs/static/img/crowdsec_logo.png"

platforms:
  - linux
  - windows
  - mac
  - docker
  - kubernetes

categories:
  - it-security
  - network-management

developmentStatus: stable

softwareType: "standalone/backend"

description:
  en:
    shortDescription: >-
      Open source, collaborative IDS/IPS and WAF that detects malicious
      behaviour and blocks attacks using crowdsourced threat intelligence.
    longDescription: >-
      CrowdSec is an open source (MIT), collaborative security engine that
      analyses logs and HTTP requests to detect malicious behaviours and
      attacks. When a threat is detected, its Remediation Components can block
      the offending IP. By sharing anonymised attack signals, every user
      contributes to and benefits from a real-world, community-curated Cyber
      Threat Intelligence. CrowdSec works as an all-in-one IDS/IPS and WAF, is
      compatible with virtually any platform, and ships packaged for most Linux
      distributions as well as Docker images and Kubernetes Helm charts. It is a
      modern, collaborative alternative to signature-only intrusion prevention
      systems such as fail2ban, particularly suited to public administrations
      seeking to reinforce the security of their infrastructures.
    features:
      - Intrusion detection and prevention (IDS/IPS)
      - Web Application Firewall (WAF)
      - Crowdsourced Cyber Threat Intelligence
      - Behavioural log analysis
      - Remediation components (bouncers)
      - Docker and Kubernetes support
    documentation: "https://docs.crowdsec.net/"
  it:
    shortDescription: >-
      Motore di sicurezza open source e collaborativo (IDS/IPS e WAF) che rileva
      comportamenti malevoli e blocca gli attacchi tramite threat intelligence
      condivisa.
    longDescription: >-
      CrowdSec è un motore di sicurezza open source (licenza MIT) e
      collaborativo che analizza log e richieste HTTP per rilevare comportamenti
      malevoli e attacchi. Quando viene individuata una minaccia, i Remediation
      Components possono bloccare l'indirizzo IP responsabile. Condividendo
      segnali di attacco anonimizzati, ogni utente contribuisce e beneficia di
      una Cyber Threat Intelligence reale e curata dalla comunità. CrowdSec
      funziona come soluzione all-in-one IDS/IPS e WAF, è compatibile con quasi
      tutte le piattaforme ed è distribuito come pacchetto per le principali
      distribuzioni Linux, oltre a immagini Docker e chart Helm per Kubernetes.
      Rappresenta un'alternativa moderna e collaborativa ai sistemi di
      prevenzione basati solo su firme (come fail2ban), particolarmente adatta
      alle Pubbliche Amministrazioni che vogliono rafforzare la sicurezza delle
      proprie infrastrutture.
    features:
      - Rilevamento e prevenzione delle intrusioni (IDS/IPS)
      - Web Application Firewall (WAF)
      - Cyber Threat Intelligence condivisa dalla comunità
      - Analisi comportamentale dei log
      - Componenti di remediation (bouncer)
      - Supporto Docker e Kubernetes
    documentation: "https://docs.crowdsec.net/"

legal:
  license: MIT
  mainCopyrightOwner: CrowdSec SAS
  repoOwner: CrowdSec SAS

maintenance:
  type: internal
  contacts:
    - name: CrowdSec Team
      email: "support@crowdsec.net"

localisation:
